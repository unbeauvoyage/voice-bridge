<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Knowledge Base</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 640px;
      min-height: 500px;
      max-height: 80vh;
      background: #1a1a2e;
      color: #e0e0f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      position: relative;
      overflow-y: auto;
    }

    .header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid #2a2a4a;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #a0b4ff;
      letter-spacing: 0.02em;
    }

    .current-url {
      margin-top: 6px;
      font-size: 11px;
      color: #7080a0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 608px;
    }

    .save-section {
      padding: 12px 16px;
      border-bottom: 1px solid #2a2a4a;
    }

    #save-btn {
      width: 100%;
      padding: 9px 0;
      background: #4a6fff;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    #save-btn:hover:not(:disabled) {
      background: #3a5fee;
    }

    #save-btn:disabled {
      background: #2a3a6a;
      color: #6070a0;
      cursor: default;
    }

    #status {
      margin-top: 8px;
      min-height: 18px;
      font-size: 12px;
      color: #7080a0;
    }

    #status.success {
      color: #50c878;
    }

    #status.error {
      color: #ff6060;
    }

    .divider {
      height: 1px;
      background: #2a2a4a;
    }

    .recent-section {
      padding: 10px 16px 12px;
    }

    .recent-section h2 {
      font-size: 11px;
      font-weight: 600;
      color: #5060a0;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .item {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      padding: 5px 0;
      border-bottom: 1px solid #1e1e38;
    }

    .item:last-child {
      border-bottom: none;
    }

    .item-body {
      flex: 1;
      min-width: 0;
    }

    .item-title {
      display: block;
      color: #b0c0ff;
      text-decoration: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 12px;
      font-weight: 500;
    }

    .item-title:hover {
      color: #d0deff;
    }

    .item-date {
      font-size: 10px;
      color: #40507a;
      margin-top: 1px;
    }

    .read-btn {
      flex-shrink: 0;
      padding: 2px 7px;
      background: #1e2a4a;
      color: #7090d0;
      border: 1px solid #2a3a6a;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
      margin-top: 1px;
    }

    .read-btn:hover {
      background: #2a3a6a;
      color: #a0c0ff;
    }

    .visit-btn {
      flex-shrink: 0;
      padding: 2px 6px;
      background: #1e2a4a;
      color: #7090d0;
      border: 1px solid #2a3a6a;
      border-radius: 4px;
      font-size: 12px;
      line-height: 1;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
      margin-top: 1px;
    }

    .visit-btn:hover {
      background: #2a3a6a;
      color: #a0c0ff;
    }

    /* Modal */
    #modal-overlay {
      display: none;
      position: absolute;
      inset: 0;
      z-index: 10;
      background: #111827;
      overflow-y: auto;
      flex-direction: column;
      animation: fadeIn 0.15s ease;
    }

    #modal-overlay.visible {
      display: flex;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      padding: 14px 16px 10px;
      border-bottom: 1px solid #1f2d47;
      position: sticky;
      top: 0;
      background: #111827;
    }

    .modal-title {
      font-size: 13px;
      font-weight: 700;
      color: #e0eaff;
      line-height: 1.4;
    }

    .modal-close {
      flex-shrink: 0;
      background: none;
      border: none;
      color: #506080;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      padding: 0 2px;
    }

    .modal-close:hover {
      color: #c0d0ff;
    }

    .modal-body {
      padding: 12px 16px 16px;
      flex: 1;
    }

    .modal-summary {
      font-size: 12px;
      color: #a0b4d0;
      line-height: 1.5;
      margin-bottom: 12px;
    }

    .modal-section-label {
      font-size: 10px;
      font-weight: 700;
      color: #3a5080;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    .modal-section-title {
      font-size: 12px;
      font-weight: 700;
      color: #a0b8e0;
      margin: 12px 0 5px;
    }

    .modal-section-title:first-child {
      margin-top: 0;
    }

    .modal-points {
      list-style: none;
      margin-bottom: 4px;
    }

    .modal-points li {
      font-size: 11px;
      color: #c0d0e8;
      line-height: 1.5;
      padding-left: 10px;
      position: relative;
      margin-bottom: 3px;
    }

    .modal-points li::before {
      content: "•";
      position: absolute;
      left: 0;
      color: #4a6fff;
    }

    .modal-transcript {
      margin-top: 14px;
      border-top: 1px solid #1f2d47;
      padding-top: 10px;
    }

    .modal-transcript summary {
      font-size: 11px;
      font-weight: 600;
      color: #3a5080;
      cursor: pointer;
      user-select: none;
      padding: 2px 0;
    }

    .modal-transcript summary:hover {
      color: #6080b0;
    }

    .modal-transcript pre {
      margin-top: 8px;
      font-size: 10px;
      color: #7080a0;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      background: #0e1420;
      border-radius: 4px;
      padding: 8px 10px;
      max-height: 300px;
      overflow-y: auto;
    }

    .modal-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 14px;
    }

    .modal-tag {
      font-size: 10px;
      color: #6080b0;
      background: #1a2440;
      border: 1px solid #2a3a60;
      border-radius: 3px;
      padding: 1px 6px;
    }

    .modal-open-link {
      display: inline-block;
      font-size: 11px;
      color: #4a6fff;
      text-decoration: none;
    }

    .modal-open-link:hover {
      color: #7090ff;
      text-decoration: underline;
    }

    .empty-state {
      color: #40507a;
      font-size: 12px;
      padding: 4px 0;
    }

    .server-error {
      color: #ff8060;
      font-size: 12px;
      line-height: 1.4;
    }

    .server-error code {
      display: block;
      margin-top: 4px;
      font-family: monospace;
      font-size: 11px;
      color: #c0d0ff;
      background: #14142a;
      padding: 4px 6px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Knowledge Base</h1>
    <div class="current-url" id="current-url">Loading...</div>
  </div>

  <div class="save-section">
    <button id="save-btn">Save to Knowledge Base</button>
    <div id="status"></div>
  </div>

  <div class="recent-section">
    <h2>Recent Items</h2>
    <div id="items-list"><div class="empty-state">Loading...</div></div>
  </div>

  <div id="modal-overlay">
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" id="modal-close">&times;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
