<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Knowledge Base</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 640px;
      min-height: 500px;
      max-height: 80vh;
      background: #1a1a2e;
      color: #e0e0f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      position: relative;
      overflow-y: auto;
    }

    .header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid #2a2a4a;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #a0b4ff;
      letter-spacing: 0.02em;
    }

    .current-url {
      margin-top: 6px;
      font-size: 11px;
      color: #7080a0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 608px;
    }

    .save-section {
      padding: 12px 16px;
      border-bottom: 1px solid #2a2a4a;
    }

    #save-btn {
      width: 100%;
      padding: 9px 0;
      background: #4a6fff;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    #save-btn:hover:not(:disabled) {
      background: #3a5fee;
    }

    #save-btn:disabled {
      background: #2a3a6a;
      color: #6070a0;
      cursor: default;
    }

    #status {
      margin-top: 8px;
      min-height: 18px;
      font-size: 12px;
      color: #7080a0;
    }

    #status.success {
      color: #50c878;
    }

    #status.error {
      color: #ff6060;
    }

    .divider {
      height: 1px;
      background: #2a2a4a;
    }

    /* Search bar */
    .search-section {
      padding: 10px 16px;
      border-bottom: 1px solid #2a2a4a;
    }

    .search-wrap {
      display: flex;
      align-items: center;
      background: #12122a;
      border: 1px solid #2a2a4a;
      border-radius: 6px;
      padding: 0 10px;
      gap: 6px;
    }

    .search-wrap:focus-within {
      border-color: #4a6fff;
    }

    .search-icon {
      color: #506080;
      font-size: 13px;
      flex-shrink: 0;
      user-select: none;
    }

    #search-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: #c0d0e8;
      font-size: 12px;
      padding: 7px 0;
    }

    #search-input::placeholder {
      color: #3a4a6a;
    }

    .search-clear {
      background: none;
      border: none;
      color: #3a4a6a;
      font-size: 14px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
      display: none;
    }

    .search-clear.visible {
      display: block;
      color: #506080;
    }

    .search-clear:hover {
      color: #a0b0d0;
    }

    /* Filter bar */
    .filter-bar {
      padding: 8px 16px;
      border-bottom: 1px solid #2a2a4a;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .filter-tags-row.hidden {
      display: none;
    }

    .filter-tags-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 4px;
      min-height: 22px;
    }

    .filter-tag-label {
      font-size: 10px;
      color: #40507a;
      flex-shrink: 0;
      margin-right: 2px;
    }

    .filter-tag-chip {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 10px;
      color: #93c5fd;
      background: #0e1a30;
      border: 1px solid #2a4a80;
      border-radius: 10px;
      padding: 1px 7px 1px 8px;
      cursor: default;
    }

    .filter-tag-remove {
      background: none;
      border: none;
      color: #4a6aaa;
      font-size: 12px;
      line-height: 1;
      cursor: pointer;
      padding: 0;
      margin-left: 1px;
    }

    .filter-tag-remove:hover {
      color: #93c5fd;
    }

    .filter-clear-btn {
      margin-left: auto;
      background: none;
      border: 1px solid #2a3050;
      border-radius: 4px;
      color: #506080;
      font-size: 10px;
      padding: 2px 7px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .filter-clear-btn:hover {
      color: #a0b0d0;
      border-color: #4a5080;
    }

    .filter-date-row {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .date-filter-btn {
      background: #12122a;
      border: 1px solid #2a2a4a;
      border-radius: 4px;
      color: #506080;
      font-size: 10px;
      padding: 2px 8px;
      cursor: pointer;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
    }

    .date-filter-btn:hover {
      color: #a0b0d0;
      border-color: #3a4a70;
    }

    .date-filter-btn.active {
      background: #1a2a50;
      color: #93c5fd;
      border-color: #2a4a80;
    }

    /* Item tag chips (shown in list rows) */
    .item-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      margin-top: 3px;
    }

    .item-tag {
      font-size: 9px;
      color: #506080;
      background: #14182e;
      border: 1px solid #252a40;
      border-radius: 3px;
      padding: 0 5px;
      cursor: pointer;
      transition: color 0.1s, border-color 0.1s;
    }

    .item-tag:hover {
      color: #a0b4ff;
      border-color: #3a4a70;
    }

    .recent-section {
      padding: 10px 16px 12px;
    }

    .items-heading-row {
      display: flex;
      align-items: center;
      margin-bottom: 8px;
    }

    .recent-section h2 {
      font-size: 11px;
      font-weight: 600;
      color: #5060a0;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      flex: 1;
    }

    .items-refresh-btn {
      background: none;
      border: none;
      color: #3a4a6a;
      font-size: 13px;
      line-height: 1;
      cursor: pointer;
      padding: 0 2px;
    }

    .items-refresh-btn:hover {
      color: #7080b0;
    }

    .item {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      padding: 5px 0;
      border-bottom: 1px solid #1e1e38;
    }

    .item:last-child {
      border-bottom: none;
    }

    .item-body {
      flex: 1;
      min-width: 0;
    }

    .item-title {
      display: block;
      color: #b0c0ff;
      text-decoration: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 12px;
      font-weight: 500;
    }

    .item-title:hover {
      color: #d0deff;
    }

    .item-date {
      font-size: 10px;
      color: #40507a;
      margin-top: 1px;
    }

    .read-btn {
      flex-shrink: 0;
      padding: 2px 7px;
      background: #1e2a4a;
      color: #7090d0;
      border: 1px solid #2a3a6a;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
      margin-top: 1px;
    }

    .read-btn:hover {
      background: #2a3a6a;
      color: #a0c0ff;
    }

    .visit-btn {
      flex-shrink: 0;
      padding: 2px 6px;
      background: #1e2a4a;
      color: #7090d0;
      border: 1px solid #2a3a6a;
      border-radius: 4px;
      font-size: 12px;
      line-height: 1;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
      margin-top: 1px;
    }

    .visit-btn:hover {
      background: #2a3a6a;
      color: #a0c0ff;
    }

    /* Read indicator dot */
    .read-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #38c76a;
      flex-shrink: 0;
      margin-top: 5px;
    }

    .item-title.is-read {
      opacity: 0.55;
    }

    /* Tags review section */
    .tags-section {
      padding: 10px 16px 12px;
      border-top: 1px solid #2a2a4a;
    }

    .tags-section h2 {
      font-size: 11px;
      font-weight: 600;
      color: #5060a0;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .tag-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 0;
      border-bottom: 1px solid #1e1e38;
      font-size: 11px;
    }

    .tag-row:last-child {
      border-bottom: none;
    }

    .tag-name {
      font-weight: 600;
      color: #d0c060;
      flex-shrink: 0;
    }

    .tag-item-title {
      flex: 1;
      color: #506080;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 10px;
    }

    .tag-approve-btn,
    .tag-reject-btn {
      flex-shrink: 0;
      background: none;
      border: 1px solid;
      border-radius: 3px;
      font-size: 11px;
      line-height: 1;
      padding: 1px 5px;
      cursor: pointer;
      transition: background 0.1s;
    }

    .tag-approve-btn {
      color: #38c76a;
      border-color: #2a5a3a;
    }

    .tag-approve-btn:hover {
      background: #1a3a28;
    }

    .tag-reject-btn {
      color: #e05050;
      border-color: #5a2a2a;
    }

    .tag-reject-btn:hover {
      background: #3a1a1a;
    }

    /* Modal tag badge variants */
    .modal-tag.approved {
      color: #38c76a;
      background: #0e2018;
      border-color: #1a4a28;
    }

    .modal-tag.pending {
      color: #d0c060;
      background: #1e1a08;
      border-color: #4a4010;
    }

    .modal-tag-approve,
    .modal-tag-reject {
      background: none;
      border: none;
      font-size: 10px;
      cursor: pointer;
      padding: 0 1px;
      line-height: 1;
    }

    .modal-tag-approve { color: #38c76a; }
    .modal-tag-reject  { color: #e05050; }

    /* Modal */
    #modal-overlay {
      display: none;
      position: absolute;
      inset: 0;
      z-index: 10;
      background: #111827;
      overflow-y: auto;
      flex-direction: column;
      animation: fadeIn 0.15s ease;
    }

    #modal-overlay.visible {
      display: flex;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      padding: 14px 16px 10px;
      border-bottom: 1px solid #1f2d47;
      position: sticky;
      top: 0;
      background: #111827;
    }

    .modal-title {
      font-size: 13px;
      font-weight: 700;
      color: #e0eaff;
      line-height: 1.4;
    }

    .modal-close {
      flex-shrink: 0;
      background: none;
      border: none;
      color: #506080;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      padding: 0 2px;
    }

    .modal-close:hover {
      color: #c0d0ff;
    }

    .modal-body {
      padding: 12px 16px 16px;
      flex: 1;
    }

    .modal-tldr {
      margin-bottom: 14px;
      padding: 10px 12px;
      background: #0e1830;
      border-left: 3px solid #3b5fc0;
      border-radius: 0 5px 5px 0;
    }

    .modal-tldr-line {
      font-size: 13px;
      color: #93c5fd;
      line-height: 1.55;
      padding-left: 14px;
      position: relative;
      margin-bottom: 5px;
    }

    .modal-tldr-line:last-child {
      margin-bottom: 0;
    }

    .modal-tldr-line::before {
      content: "•";
      position: absolute;
      left: 0;
      color: #3b82f6;
    }

    .modal-summary {
      font-size: 12px;
      color: #a0b4d0;
      line-height: 1.5;
      margin-bottom: 12px;
    }

    .modal-section-label {
      font-size: 10px;
      font-weight: 700;
      color: #3a5080;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    .modal-section-title {
      font-size: 12px;
      font-weight: 700;
      color: #a0b8e0;
      margin: 12px 0 5px;
    }

    .modal-section-title:first-child {
      margin-top: 0;
    }

    .modal-points {
      list-style: none;
      margin-bottom: 4px;
    }

    .modal-points li {
      font-size: 11px;
      color: #c0d0e8;
      line-height: 1.5;
      padding-left: 10px;
      position: relative;
      margin-bottom: 3px;
    }

    .modal-points li::before {
      content: "•";
      position: absolute;
      left: 0;
      color: #4a6fff;
    }

    .modal-transcript {
      margin-top: 14px;
      border-top: 1px solid #1f2d47;
      padding-top: 10px;
    }

    .modal-transcript summary {
      font-size: 11px;
      font-weight: 600;
      color: #3a5080;
      cursor: pointer;
      user-select: none;
      padding: 2px 0;
    }

    .modal-transcript summary:hover {
      color: #6080b0;
    }

    .modal-transcript pre {
      margin-top: 8px;
      font-size: 10px;
      color: #7080a0;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      background: #0e1420;
      border-radius: 4px;
      padding: 8px 10px;
      max-height: 300px;
      overflow-y: auto;
    }

    .modal-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 14px;
    }

    .modal-tag {
      font-size: 10px;
      color: #6080b0;
      background: #1a2440;
      border: 1px solid #2a3a60;
      border-radius: 3px;
      padding: 1px 6px;
    }

    .modal-open-link {
      display: inline-block;
      font-size: 11px;
      color: #4a6fff;
      text-decoration: none;
    }

    .modal-open-link:hover {
      color: #7090ff;
      text-decoration: underline;
    }

    .empty-state {
      color: #40507a;
      font-size: 12px;
      padding: 4px 0;
    }

    .server-error {
      color: #ff8060;
      font-size: 12px;
      line-height: 1.4;
    }

    .server-error code {
      display: block;
      margin-top: 4px;
      font-family: monospace;
      font-size: 11px;
      color: #c0d0ff;
      background: #14142a;
      padding: 4px 6px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Knowledge Base</h1>
    <div class="current-url" id="current-url">Loading...</div>
  </div>

  <div class="save-section">
    <button id="save-btn">Save to Knowledge Base</button>
    <div id="status"></div>
  </div>

  <div class="search-section">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input id="search-input" type="text" placeholder="Search titles, summaries, transcripts…" autocomplete="off" />
      <button class="search-clear" id="search-clear" title="Clear">&times;</button>
    </div>
  </div>

  <div class="filter-bar" id="filter-bar">
    <div class="filter-tags-row hidden" id="filter-tags-row">
      <span class="filter-tag-label">Tags:</span>
      <!-- active tag chips injected here -->
      <button class="filter-clear-btn" id="filter-clear-btn">&#x2715; clear</button>
    </div>
    <div class="filter-date-row" id="filter-date-row">
      <button class="date-filter-btn active" data-days="0">All</button>
      <button class="date-filter-btn" data-days="1">Today</button>
      <button class="date-filter-btn" data-days="2">2d</button>
      <button class="date-filter-btn" data-days="3">3d</button>
      <button class="date-filter-btn" data-days="4">4d</button>
    </div>
  </div>

  <div class="recent-section">
    <div class="items-heading-row">
      <h2 id="items-heading">Recent Items</h2>
      <button class="items-refresh-btn" id="items-refresh-btn" title="Refresh">&#x21BB;</button>
    </div>
    <div id="items-list"><div class="empty-state">Loading...</div></div>
  </div>

  <div class="tags-section" id="tags-section" style="display:none">
    <h2>Tags to review</h2>
    <div id="tags-list"></div>
  </div>

  <div id="modal-overlay">
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" id="modal-close">&times;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
