<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Knowledge Base</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 300px;
      background: #1a1a2e;
      color: #e0e0f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
    }

    .header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid #2a2a4a;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #a0b4ff;
      letter-spacing: 0.02em;
    }

    .current-url {
      margin-top: 6px;
      font-size: 11px;
      color: #7080a0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 268px;
    }

    .save-section {
      padding: 12px 16px;
      border-bottom: 1px solid #2a2a4a;
    }

    #save-btn {
      width: 100%;
      padding: 9px 0;
      background: #4a6fff;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    #save-btn:hover:not(:disabled) {
      background: #3a5fee;
    }

    #save-btn:disabled {
      background: #2a3a6a;
      color: #6070a0;
      cursor: default;
    }

    #status {
      margin-top: 8px;
      min-height: 18px;
      font-size: 12px;
      color: #7080a0;
    }

    #status.success {
      color: #50c878;
    }

    #status.error {
      color: #ff6060;
    }

    .divider {
      height: 1px;
      background: #2a2a4a;
    }

    .recent-section {
      padding: 10px 16px 12px;
    }

    .recent-section h2 {
      font-size: 11px;
      font-weight: 600;
      color: #5060a0;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .item {
      padding: 5px 0;
      border-bottom: 1px solid #1e1e38;
    }

    .item:last-child {
      border-bottom: none;
    }

    .item-title {
      display: block;
      color: #b0c0ff;
      text-decoration: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 12px;
      font-weight: 500;
    }

    .item-title:hover {
      color: #d0deff;
    }

    .item-date {
      font-size: 10px;
      color: #40507a;
      margin-top: 1px;
    }

    .empty-state {
      color: #40507a;
      font-size: 12px;
      padding: 4px 0;
    }

    .server-error {
      color: #ff8060;
      font-size: 12px;
      line-height: 1.4;
    }

    .server-error code {
      display: block;
      margin-top: 4px;
      font-family: monospace;
      font-size: 11px;
      color: #c0d0ff;
      background: #14142a;
      padding: 4px 6px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Knowledge Base</h1>
    <div class="current-url" id="current-url">Loading...</div>
  </div>

  <div class="save-section">
    <button id="save-btn">Save to Knowledge Base</button>
    <div id="status"></div>
  </div>

  <div class="recent-section">
    <h2>Recent Items</h2>
    <div id="items-list"><div class="empty-state">Loading...</div></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
