<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Knowledge Base</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    :root {
      --font-size: 15px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    body {
      background: #1a1a2e;
      color: #e0e0f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: var(--font-size);
    }

    #app-root {
      width: var(--popup-width, 780px);
      height: var(--popup-height, 600px);
      min-width: 380px;
      min-height: 500px;
      overflow: auto;
      box-sizing: border-box;
      position: relative;
    }

    #resize-handle {
      position: fixed;
      bottom: 0;
      right: 0;
      width: 20px;
      height: 20px;
      cursor: nwse-resize;
      background: linear-gradient(135deg, transparent 50%, #888 50%);
      z-index: 9999;
    }

    .header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid #2a2a4a;
      display: flex;
      align-items: baseline;
      gap: 8px;
      flex-wrap: wrap;
    }

    .header h1 {
      font-size: 1em;
      font-weight: 600;
      color: #a0b4ff;
      letter-spacing: 0.02em;
      flex: 1;
    }


    .queue-badge {
      display: none;
      font-size: 10px;
      font-weight: 700;
      color: #fff;
      background: #4a6fff;
      border-radius: 10px;
      padding: 1px 7px;
      flex-shrink: 0;
    }

    .queue-badge.visible {
      display: inline-block;
    }

    .current-url {
      margin-top: 6px;
      font-size: 11px;
      color: #7080a0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 608px;
    }


    /* Processing section */
    .processing-section {
      display: none;
      padding: 8px 16px;
      border-bottom: 1px solid #2a2a4a;
      background: #0e1420;
    }

    .processing-section.visible {
      display: block;
    }

    .processing-section-label {
      font-size: 10px;
      font-weight: 700;
      color: #3a5080;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    .processing-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      border-bottom: 1px solid #161a2e;
      font-size: 11px;
    }

    .processing-item:last-child {
      border-bottom: none;
    }

    .processing-item-title {
      flex: 1;
      color: #8090b8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .processing-status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .processing-status-dot.queued { background: #506090; }

    .processing-status-dot.processing {
      background: #ffaa30;
      animation: pulse 1.2s ease-in-out infinite;
    }

    .processing-status-dot.done { background: #38c76a; }
    .processing-status-dot.error { background: #e05050; }

    .processing-retry-btn {
      flex-shrink: 0;
      background: none;
      border: 1px solid #4a2020;
      border-radius: 3px;
      color: #e05050;
      font-size: 10px;
      padding: 1px 6px;
      cursor: pointer;
      transition: background 0.1s;
    }

    .processing-retry-btn:hover {
      background: #2a1010;
      color: #ff7070;
    }

    .processing-retry-all-btn {
      display: block;
      width: 100%;
      margin-bottom: 6px;
      padding: 5px 10px;
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.35);
      border-radius: 4px;
      color: #fca5a5;
      font-size: 11px;
      cursor: pointer;
    }
    .processing-retry-all-btn:hover:not(:disabled) {
      background: rgba(239, 68, 68, 0.16);
      color: #fecaca;
    }
    .processing-retry-all-btn:disabled { opacity: 0.6; cursor: default; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .processing-status-label {
      font-size: 10px;
      color: #506080;
      flex-shrink: 0;
    }

    .save-section {
      padding: 12px 16px;
      border-bottom: 1px solid #2a2a4a;
    }

    #save-btn {
      width: 100%;
      padding: 9px 0;
      background: #4a6fff;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    #save-btn:hover:not(:disabled) {
      background: #3a5fee;
    }

    #save-btn:disabled {
      background: #2a3a6a;
      color: #6070a0;
      cursor: default;
    }

    #save-btn.saved {
      background: #1a4a2a;
      color: #50c878;
    }

    #save-btn.duplicate {
      background: #2a2a4a;
      color: #8090b0;
    }

    #save-btn.error-state {
      background: #4a1a1a;
      color: #e05050;
    }

    #status {
      margin-top: 8px;
      min-height: 18px;
      font-size: 12px;
      color: #7080a0;
    }

    #status.success {
      color: #50c878;
    }

    #status.error {
      color: #ff6060;
    }

    #status.info {
      color: #7090d0;
    }

    .divider {
      height: 1px;
      background: #2a2a4a;
    }

    /* Search bar */
    .search-section {
      padding: 10px 16px;
      border-bottom: 1px solid #2a2a4a;
    }

    .search-wrap {
      display: flex;
      align-items: center;
      background: #12122a;
      border: 1px solid #2a2a4a;
      border-radius: 6px;
      padding: 0 10px;
      gap: 6px;
    }

    .search-wrap:focus-within {
      border-color: #4a6fff;
    }

    .search-icon {
      color: #506080;
      font-size: 13px;
      flex-shrink: 0;
      user-select: none;
    }

    #search-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: #c0d0e8;
      font-size: 0.9em;
      padding: 7px 0;
    }

    #search-input::placeholder {
      color: #3a4a6a;
    }

    .search-clear {
      background: none;
      border: none;
      color: #3a4a6a;
      font-size: 14px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
      display: none;
    }

    .search-clear.visible {
      display: block;
      color: #506080;
    }

    .search-clear:hover {
      color: #a0b0d0;
    }

    /* Filter bar */
    .filter-bar {
      padding: 8px 16px;
      border-bottom: 1px solid #2a2a4a;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .filter-tags-row.hidden {
      display: none;
    }

    .filter-tags-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 4px;
      min-height: 22px;
    }

    .filter-tag-label {
      font-size: 10px;
      color: #40507a;
      flex-shrink: 0;
      margin-right: 2px;
    }

    .filter-tag-chip {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 10px;
      color: #93c5fd;
      background: #0e1a30;
      border: 1px solid #2a4a80;
      border-radius: 10px;
      padding: 1px 7px 1px 8px;
      cursor: default;
    }

    .filter-tag-remove {
      background: none;
      border: none;
      color: #4a6aaa;
      font-size: 12px;
      line-height: 1;
      cursor: pointer;
      padding: 0;
      margin-left: 1px;
    }

    .filter-tag-remove:hover {
      color: #93c5fd;
    }

    .filter-clear-btn {
      margin-left: auto;
      background: none;
      border: 1px solid #2a3050;
      border-radius: 4px;
      color: #506080;
      font-size: 10px;
      padding: 2px 7px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .filter-clear-btn:hover {
      color: #a0b0d0;
      border-color: #4a5080;
    }

    .filter-date-row {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .date-filter-btn {
      background: #12122a;
      border: 1px solid #2a2a4a;
      border-radius: 4px;
      color: #506080;
      font-size: 10px;
      padding: 2px 8px;
      cursor: pointer;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
    }

    .date-filter-btn:hover {
      color: #a0b0d0;
      border-color: #3a4a70;
    }

    .date-filter-btn.active {
      background: #1a2a50;
      color: #93c5fd;
      border-color: #2a4a80;
    }

    /* Compact pending tags banner */
    .tags-pending-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 16px;
      background: #1a1808;
      border-bottom: 1px solid #3a3010;
      font-size: 11px;
      color: #a09040;
    }

    .tags-pending-bar.hidden {
      display: none;
    }

    .tags-pending-icon {
      flex-shrink: 0;
    }

    #tags-pending-count {
      flex: 1;
    }

    .tags-pending-review-btn {
      background: none;
      border: 1px solid #4a4010;
      border-radius: 3px;
      color: #d0a030;
      font-size: 10px;
      padding: 2px 7px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .tags-pending-review-btn:hover {
      background: #2a2008;
      color: #e0c050;
    }

    /* Item tag chips (shown in list rows) */
    .item-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      margin-top: 3px;
    }

    .item-tag {
      font-size: 9px;
      color: #506080;
      background: #14182e;
      border: 1px solid #252a40;
      border-radius: 3px;
      padding: 0 5px;
      cursor: pointer;
      transition: color 0.1s, border-color 0.1s;
    }

    .item-tag:hover {
      color: #a0b4ff;
      border-color: #3a4a70;
    }

    .quick-summary-card {
      margin: 10px 16px 0;
      padding: 10px 12px;
      background: #162038;
      border: 1px solid #2a4a80;
      border-left: 3px solid #4a6fff;
      border-radius: 5px;
    }

    .quick-summary-card.hidden {
      display: none;
    }

    .quick-summary-label {
      font-size: 9px;
      font-weight: 700;
      color: #6a8fe0;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 5px;
    }

    .quick-summary-title {
      display: block;
      font-size: 0.95em;
      font-weight: 600;
      color: #c0d4ff;
      text-decoration: none;
      line-height: 1.35;
      margin-bottom: 7px;
    }

    .quick-summary-title:hover {
      color: #e0eaff;
      text-decoration: underline;
      text-decoration-color: rgba(176, 192, 255, 0.5);
      text-underline-offset: 2px;
    }

    .quick-summary-tldr {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .quick-summary-tldr li {
      font-size: 0.85em;
      color: #93c5fd;
      line-height: 1.5;
      padding-left: 12px;
      position: relative;
      margin-bottom: 3px;
    }

    .quick-summary-tldr li:last-child {
      margin-bottom: 0;
    }

    .quick-summary-tldr li::before {
      content: "•";
      position: absolute;
      left: 0;
      color: #3b82f6;
    }

    .recent-section {
      padding: 10px 16px 12px;
    }

    .collection-filter-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 8px;
      font-size: 13px;
      border-bottom: 1px solid #2a2a4a;
      background: #12122a;
    }

    .collection-filter-label {
      color: #5060a0;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }

    .collection-filter-select {
      flex: 1;
      max-width: 200px;
      background: #1a1a2e;
      color: #e0e0f0;
      border: 1px solid #2a2a4a;
      border-radius: 4px;
      padding: 3px 6px;
      font-size: 12px;
      cursor: pointer;
    }

    .collection-filter-select:focus {
      outline: none;
      border-color: #4a6fff;
    }

    .items-heading-row {
      display: flex;
      align-items: center;
      margin-bottom: 8px;
    }

    .recent-section h2 {
      font-size: 11px;
      font-weight: 600;
      color: #5060a0;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      flex: 1;
    }

    .items-refresh-btn {
      background: none;
      border: none;
      color: #3a4a6a;
      font-size: 13px;
      line-height: 1;
      cursor: pointer;
      padding: 0 2px;
    }

    .items-refresh-btn:hover {
      color: #7080b0;
    }

    .item {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      padding: 5px 0;
      border-bottom: 1px solid #1e1e38;
    }

    .item:last-child {
      border-bottom: none;
    }

    .item-body {
      flex: 1;
      min-width: 0;
    }

    .item-title {
      display: block;
      color: #b0c0ff;
      text-decoration: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 0.9em;
      font-weight: 500;
      cursor: pointer;
    }

    .item-title:hover {
      color: #d0deff;
      text-decoration: underline;
      text-decoration-color: rgba(176, 192, 255, 0.4);
      text-underline-offset: 2px;
    }

    .item-title:focus {
      outline: 2px solid #4a6fff;
      outline-offset: 2px;
      border-radius: 2px;
    }

    .item-date {
      font-size: 10px;
      color: #40507a;
      margin-top: 1px;
    }

    .item-published-at {
      font-size: 10px;
      color: #384870;
      margin-top: 1px;
    }

    .visit-btn {
      flex-shrink: 0;
      padding: 2px 6px;
      background: #1e2a4a;
      color: #7090d0;
      border: 1px solid #2a3a6a;
      border-radius: 4px;
      font-size: 12px;
      line-height: 1;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
      margin-top: 1px;
    }

    .visit-btn:hover {
      background: #2a3a6a;
      color: #a0c0ff;
    }

    .raise-btn {
      flex-shrink: 0;
      padding: 2px 6px;
      background: #1a2340;
      color: #7090d0;
      border: 1px solid #2a3a6a;
      border-radius: 4px;
      font-size: 11px;
      line-height: 1;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
      margin-top: 1px;
      margin-right: 4px;
    }

    .raise-btn:hover:not(:disabled) {
      background: #2a3a6a;
      color: #ffd080;
    }

    .raise-btn.raised {
      background: #2a4020;
      color: #a0d890;
      border: 1px dashed #5a8a4a;
      cursor: pointer;
    }

    .raise-btn.raised::after {
      content: ' ✎';
      opacity: 0.6;
    }

    .raise-btn.raised:hover {
      background: #3a5530;
      color: #d0f0b0;
      border-color: #80b070;
      border-style: solid;
    }

    .raise-btn.raised:hover::after {
      opacity: 1;
    }

    .raise-btn:disabled {
      background: #203050;
      color: #6a8ab0;
      cursor: default;
    }

    .raise-form {
      margin: 4px 8px 8px 8px;
      padding: 8px;
      background: #1a2340;
      border: 1px solid #2a3a6a;
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .raise-note {
      width: 100%;
      box-sizing: border-box;
      background: #0e1528;
      color: #c0d0f0;
      border: 1px solid #2a3a6a;
      border-radius: 3px;
      padding: 6px;
      font-family: inherit;
      font-size: 12px;
      resize: vertical;
    }

    .raise-note:focus {
      outline: none;
      border-color: #5070b0;
    }

    .raise-form-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .raise-submit {
      background: #3050a0;
      color: #e0ecff;
      border: none;
      border-radius: 3px;
      padding: 4px 10px;
      font-size: 11px;
      cursor: pointer;
    }

    .raise-submit:disabled {
      opacity: 0.6;
      cursor: default;
    }

    .raise-cancel {
      color: #7090d0;
      font-size: 11px;
      text-decoration: none;
    }

    .raise-cancel:hover {
      text-decoration: underline;
      color: #a0c0ff;
    }

    /* Read indicator dot */
    .read-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #38c76a;
      flex-shrink: 0;
      margin-top: 5px;
    }

    .item-title.is-read {
      opacity: 0.55;
    }

    /* Tags review section */
    .tags-section {
      padding: 10px 16px 12px;
      border-top: 1px solid #2a2a4a;
    }

    .tags-section h2 {
      font-size: 11px;
      font-weight: 600;
      color: #5060a0;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .tag-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 0;
      border-bottom: 1px solid #1e1e38;
      font-size: 11px;
    }

    .tag-row:last-child {
      border-bottom: none;
    }

    .tag-name {
      font-weight: 600;
      color: #d0c060;
      flex-shrink: 0;
    }

    .tag-item-title {
      flex: 1;
      color: #506080;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 10px;
    }

    .tag-approve-btn,
    .tag-reject-btn {
      flex-shrink: 0;
      background: none;
      border: 1px solid;
      border-radius: 3px;
      font-size: 11px;
      line-height: 1;
      padding: 1px 5px;
      cursor: pointer;
      transition: background 0.1s;
    }

    .tag-approve-btn {
      color: #38c76a;
      border-color: #2a5a3a;
    }

    .tag-approve-btn:hover {
      background: #1a3a28;
    }

    .tag-reject-btn {
      color: #e05050;
      border-color: #5a2a2a;
    }

    .tag-reject-btn:hover {
      background: #3a1a1a;
    }

    /* Modal tag badge variants are in shared.css */

    /* Modal */
    #modal-overlay {
      display: none;
      position: absolute;
      inset: 0;
      z-index: 10;
      background: #111827;
      overflow-y: auto;
      flex-direction: column;
      animation: fadeIn 0.15s ease;
    }

    #modal-overlay.visible {
      display: flex;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      padding: 14px 16px 10px;
      border-bottom: 1px solid #1f2d47;
      position: sticky;
      top: 0;
      background: #111827;
    }

    .modal-title {
      font-size: 1em;
      font-weight: 700;
      color: #e0eaff;
      line-height: 1.4;
    }

    .modal-header-actions {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .modal-close {
      background: none;
      border: none;
      color: #506080;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      padding: 0 2px;
    }

    .modal-close:hover {
      color: #c0d0ff;
    }

    .modal-delete {
      background: none;
      border: none;
      color: #804040;
      font-size: 14px;
      line-height: 1;
      cursor: pointer;
      padding: 0 4px;
      opacity: 0.7;
    }

    .modal-delete:hover {
      color: #ff5050;
      opacity: 1;
    }

    .modal-study-later-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      border-radius: 5px;
      border: 1px solid #2a3a6a;
      background: #161c2e;
      color: #8090b0;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 12px;
    }

    .modal-study-later-btn:hover {
      border-color: #4a6fff;
      color: #c0d0ff;
    }

    .modal-study-later-btn.active {
      border-color: #3a7a50;
      background: #162a20;
      color: #40c070;
    }

    .modal-quality-section {
      margin-top: 16px;
      border-top: 1px solid #1f2d47;
      padding-top: 12px;
    }

    /* Star, quality, prompt, tag, and save-btn styles are in shared.css */

    .modal-chat-section {
      margin-top: 16px;
      border-top: 1px solid #1f2d47;
      padding-top: 12px;
    }

    .modal-chat-label {
      font-size: 10px;
      font-weight: 700;
      color: #506080;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .modal-body {
      padding: 12px 16px 16px;
      flex: 1;
      font-size: 1em;
    }

    .modal-tldr {
      margin-bottom: 14px;
      padding: 10px 12px;
      background: #0e1830;
      border-left: 3px solid #3b5fc0;
      border-radius: 0 5px 5px 0;
    }

    .modal-tldr-line {
      font-size: 1em;
      color: #93c5fd;
      line-height: 1.55;
      padding-left: 14px;
      position: relative;
      margin-bottom: 5px;
    }

    .modal-tldr-line:last-child {
      margin-bottom: 0;
    }

    .modal-tldr-line::before {
      content: "•";
      position: absolute;
      left: 0;
      color: #3b82f6;
    }

    /* .modal-summary-model is now .reader-summary-model in shared.css */

    .modal-summary {
      font-size: 0.9em;
      color: #a0b4d0;
      line-height: 1.5;
      margin-bottom: 12px;
    }

    .modal-section-label {
      font-size: 10px;
      font-weight: 700;
      color: #3a5080;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    .modal-section-title {
      font-size: 12px;
      font-weight: 700;
      color: #a0b8e0;
      margin: 12px 0 5px;
    }

    .modal-section-title:first-child {
      margin-top: 0;
    }

    .modal-points {
      list-style: none;
      margin-bottom: 4px;
    }

    .modal-points li {
      font-size: 11px;
      color: #c0d0e8;
      line-height: 1.5;
      padding-left: 10px;
      position: relative;
      margin-bottom: 3px;
    }

    .modal-points li::before {
      content: "•";
      position: absolute;
      left: 0;
      color: #4a6fff;
    }

    .modal-transcript {
      margin-top: 14px;
      border-top: 1px solid #1f2d47;
      padding-top: 10px;
    }

    .modal-transcript summary {
      font-size: 11px;
      font-weight: 600;
      color: #3a5080;
      cursor: pointer;
      user-select: none;
      padding: 2px 0;
    }

    .modal-transcript summary:hover {
      color: #6080b0;
    }

    .modal-transcript pre {
      margin-top: 8px;
      font-size: 10px;
      color: #7080a0;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      background: #0e1420;
      border-radius: 4px;
      padding: 8px 10px;
      max-height: 300px;
      overflow-y: auto;
    }

    .modal-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 14px;
    }

    /* .modal-tag base style is in shared.css */

    .modal-open-link {
      display: inline-block;
      font-size: 11px;
      color: #4a6fff;
      text-decoration: none;
    }

    .modal-open-link:hover {
      color: #7090ff;
      text-decoration: underline;
    }

    .empty-state {
      color: #40507a;
      font-size: 12px;
      padding: 4px 0;
    }

    .server-error {
      color: #ff8060;
      font-size: 12px;
      line-height: 1.4;
    }

    .server-error code {
      display: block;
      margin-top: 4px;
      font-family: monospace;
      font-size: 11px;
      color: #c0d0ff;
      background: #14142a;
      padding: 4px 6px;
      border-radius: 4px;
    }

    /* Duplicate URL banner */
    .duplicate-banner {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 8px;
      padding: 7px 10px;
      background: rgba(234, 179, 8, 0.1);
      border: 1px solid rgba(234, 179, 8, 0.3);
      border-radius: 5px;
      font-size: 11px;
      color: #c8960f;
    }

    .duplicate-banner.hidden { display: none; }

    #save-btn.hidden { display: none; }

    .duplicate-banner-text { flex: 1; min-width: 0; }

    .duplicate-banner-resummarize {
      background: transparent;
      border: 1px solid rgba(234, 179, 8, 0.4);
      border-radius: 4px;
      color: #c8960f;
      font-size: 10px;
      padding: 2px 8px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .duplicate-banner-resummarize:hover { background: rgba(234, 179, 8, 0.15); }

    .duplicate-banner-dismiss {
      background: none;
      border: none;
      color: #806030;
      font-size: 14px;
      line-height: 1;
      cursor: pointer;
      padding: 0 2px;
      flex-shrink: 0;
    }

    .duplicate-banner-dismiss:hover { color: #c8960f; }

    #quick-summary-btn {
      width: 100%;
      padding: 7px 0;
      background: transparent;
      color: #7090d0;
      border: 1px solid #2a3a6a;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      margin-top: 6px;
    }

    #quick-summary-btn:hover:not(:disabled) {
      border-color: #4a6fff;
      color: #a0c0ff;
    }

    #quick-summary-btn:disabled {
      opacity: 0.45;
      cursor: default;
    }

    #preview-result {
      margin-top: 10px;
      padding: 10px 12px;
      background: #0e1420;
      border: 1px solid #2a3a6a;
      border-radius: 6px;
      font-size: 12px;
    }

    #preview-result.hidden { display: none; }

    .preview-title {
      font-weight: 600;
      color: #c0d0f0;
      margin-bottom: 6px;
      font-size: 12px;
    }

    .preview-tldr {
      list-style: none;
      margin: 0 0 8px 0;
      padding: 0;
    }

    .preview-tldr li {
      color: #8090b8;
      font-size: 11px;
      line-height: 1.5;
      padding-left: 10px;
      position: relative;
      margin-bottom: 2px;
    }

    .preview-tldr li::before {
      content: "•";
      position: absolute;
      left: 0;
      color: #4a6fff;
    }

    .preview-result-actions {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }

    .preview-save-to-kb-btn {
      flex: 1;
      padding: 5px 0;
      background: #4a6fff;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
    }

    .preview-save-to-kb-btn:hover { background: #3a5fee; }

    .preview-dismiss-btn {
      padding: 5px 10px;
      background: transparent;
      color: #506080;
      border: 1px solid #2a3a6a;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
    }

    .preview-dismiss-btn:hover { color: #a0b0d0; border-color: #4a5080; }

    .preview-section-label {
      font-size: 10px;
      font-weight: 700;
      color: #3a5080;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 10px 0 5px;
    }

    .preview-summary {
      font-size: 12px;
      color: #a0b4d0;
      line-height: 1.55;
      margin-bottom: 8px;
    }

    .preview-key-section {
      margin-bottom: 8px;
    }

    .preview-key-section-title {
      font-size: 12px;
      font-weight: 600;
      color: #a0b8e0;
      margin-bottom: 4px;
    }

    .preview-key-points {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .preview-key-points li {
      font-size: 11px;
      color: #c0d0e8;
      line-height: 1.5;
      padding-left: 10px;
      position: relative;
      margin-bottom: 2px;
    }

    .preview-key-points li::before {
      content: "•";
      position: absolute;
      left: 0;
      color: #4a6fff;
    }

    .preview-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin: 8px 0;
    }

    .preview-tag {
      font-size: 10px;
      color: #6080b0;
      background: #1a2440;
      border: 1px solid #2a3a60;
      border-radius: 3px;
      padding: 1px 6px;
    }

    /* Chat styles (.preview-chat-*) and .preview-chat-section are in shared.css */
    .preview-chat-section {
      margin-top: 10px;
      border-top: 1px solid var(--border-input, #2a3a6a);
      padding-top: 8px;
    }

    /* Font size control */
    .font-size-control {
      display: flex;
      align-items: center;
      gap: 3px;
      padding: 5px 16px;
      border-top: 1px solid #2a2a4a;
      justify-content: flex-end;
    }

    .font-size-btn {
      background: #12122a;
      border: 1px solid #2a2a4a;
      border-radius: 3px;
      color: #506080;
      cursor: pointer;
      padding: 1px 6px;
      line-height: 1.4;
      font-family: inherit;
      transition: color 0.1s, border-color 0.1s;
    }

    .font-size-btn:hover {
      color: #a0b0d0;
      border-color: #4a5080;
    }

    .font-size-btn--small {
      font-size: 11px;
    }

    .font-size-btn--large {
      font-size: 15px;
    }

    .font-size-label {
      font-size: 10px;
      color: #3a4a6a;
      min-width: 28px;
      text-align: center;
      user-select: none;
    }
  </style>
</head>
<body>
<div id="app-root">
  <div class="header">
    <h1>Knowledge Base</h1>
    <span class="queue-badge" id="queue-badge">0 processing</span>
    <div class="current-url" id="current-url">Loading...</div>
  </div>

  <div class="processing-section" id="processing-section">
    <div class="processing-section-label">Processing</div>
    <div id="processing-list"></div>
  </div>

  <div class="save-section">
    <div class="duplicate-banner hidden" id="duplicate-banner">
      <span class="duplicate-banner-text" id="duplicate-banner-text"></span>
      <button class="duplicate-banner-resummarize hidden" id="duplicate-banner-resummarize">Save again</button>
      <button class="duplicate-banner-dismiss" id="duplicate-banner-dismiss">&times;</button>
    </div>
    <button id="save-btn">Save to Knowledge Base</button>
    <button id="quick-summary-btn">Quick Summary</button>
    <div id="status"></div>
    <div id="preview-result" class="hidden"></div>
  </div>

  <div class="tags-pending-bar hidden" id="tags-pending-bar">
    <span class="tags-pending-icon">⚑</span>
    <span id="tags-pending-count"></span>
    <button class="tags-pending-review-btn" id="tags-pending-review-btn">Review &#x2192;</button>
  </div>

  <div class="search-section">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input id="search-input" type="text" placeholder="Search titles, summaries, transcripts…" autocomplete="off" />
      <button class="search-clear" id="search-clear" title="Clear">&times;</button>
    </div>
  </div>

  <div class="filter-bar" id="filter-bar">
    <div class="filter-tags-row hidden" id="filter-tags-row">
      <span class="filter-tag-label">Tags:</span>
      <!-- active tag chips injected here -->
      <button class="filter-clear-btn" id="filter-clear-btn">&#x2715; clear</button>
    </div>
    <div class="filter-date-row" id="filter-date-row">
      <button class="date-filter-btn active" data-days="0">All</button>
      <button class="date-filter-btn" data-days="1">Today</button>
      <button class="date-filter-btn" data-days="2">2d</button>
      <button class="date-filter-btn" data-days="3">3d</button>
      <button class="date-filter-btn" data-days="4">4d</button>
    </div>
  </div>

  <div class="quick-summary-card hidden" id="quick-summary-card">
    <div class="quick-summary-label">You've saved this page</div>
    <a class="quick-summary-title" id="quick-summary-title" href="#"></a>
    <ul class="quick-summary-tldr" id="quick-summary-tldr"></ul>
  </div>

  <div class="collection-filter-bar">
    <label for="collection-filter" class="collection-filter-label">Collection:</label>
    <select id="collection-filter" class="collection-filter-select">
      <option value="">All</option>
    </select>
  </div>

  <div class="recent-section">
    <div class="items-heading-row">
      <h2 id="items-heading">Recent Items</h2>
      <button class="items-refresh-btn" id="items-refresh-btn" title="Refresh">&#x21BB;</button>
    </div>
    <div id="items-list"><div class="empty-state">Loading...</div></div>
  </div>

  <div id="modal-overlay">
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-header-actions">
        <button class="modal-delete" id="modal-delete" title="Delete item">&#128465;</button>
        <button class="modal-read-in-app" id="modal-read-in-app" title="Open in web app">Read in app &rarr;</button>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>

  <div class="font-size-control">
    <button class="font-size-btn font-size-btn--small" id="font-size-decrease" title="Decrease font size">A</button>
    <span class="font-size-label" id="font-size-label">15px</span>
    <button class="font-size-btn font-size-btn--large" id="font-size-increase" title="Increase font size">A</button>
  </div>

  <script src="raise-form.js"></script>
</div><!-- #app-root -->
<div id="resize-handle" title="Drag to resize"></div>
<script src="popup.js"></script>
</body>
</html>
